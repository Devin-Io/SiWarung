<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Barang - SiWarung</title>
<style>
:root {
--bg: #eef2fb;
--surface: #ffffff;
--surface-soft: #f5f7ff;
--text: #1f2a45;
--muted: #6f7a95;
--border: #d7e0f4;
--primary: #1765e7;
--success: #1f8e4a;
--radius: 24px;
--shadow: 0 18px 40px rgba(31, 42, 69, 0.08);
}
* {
box-sizing: border-box;
}
body {
margin: 0;
min-height: 100vh;
font-family: 'Inter', system-ui, sans-serif;
background: radial-gradient(circle at top left, rgba(23, 101, 231, 0.12), transparent 26%),
rgba(238, 246, 251, 1);
color: var(--text);
}
.page {
max-width: 1180px;
margin: 0 auto;
padding: 30px 24px 40px;
}
.header {
display: flex;
align-items: center;
justify-content: space-between;
gap: 20px;
margin-bottom: 32px;
}
.brand {
display: flex;
align-items: center;
gap: 14px;
background: var(--surface);
padding: 14px 18px;
border-radius: 24px;
box-shadow: var(--shadow);
}
.brand-icon {
width: 48px;
height: 48px;
display: grid;
place-items: center;
border-radius: 16px;
background: var(--surface-soft);
}
.brand-icon img {
width: 32px;
height: 32px;
object-fit: contain;
}
.brand-name {
margin: 0;
font-size: 20px;
font-weight: 700;
}
.nav-links {
display: flex;
align-items: center;
gap: 24px;
font-size: 14px;
}
.nav-links a {
color: var(--muted);
text-decoration: none;
font-weight: 600;
}
.nav-links a:hover {
color: var(--text);
}
.cart-button {
position: relative;
width: 48px;
height: 48px;
border-radius: 16px;
background: var(--surface);
border: 1px solid rgba(23, 101, 231, 0.16);
display: grid;
place-items: center;
box-shadow: var(--shadow);
cursor: pointer;
}
.cart-badge {
position: absolute;
top: 8px;
right: 8px;
min-width: 18px;
height: 18px;
padding: 0 5px;
border-radius: 999px;
background: #ff5f5f;
color: white;
font-size: 12px;
font-weight: 700;
display: grid;
place-items: center;
}
.search-bar {
display: flex;
gap: 10px;
margin-bottom: 30px;
}
.search-bar input {
flex: 1;
border: 1px solid var(--border);
border-radius: 12px;
padding: 14px 18px;
font-size: 14px;
color: var(--text);
background: var(--surface);
outline: none;
box-shadow: inset 0 1px 2px rgba(31, 42, 69, 0.05);
}
.search-bar button {
border: none;
border-radius: 12px;
background: var(--primary);
color: white;
padding: 0 24px;
min-width: 120px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
box-shadow: 0 14px 28px rgba(23, 101, 231, 0.16);
}
.products {
display: grid;
grid-template-columns: repeat(3, minmax(0, 1fr));
gap: 20px;
margin-bottom: 36px;
}
.product-card {
background: var(--surface);
border-radius: 28px;
padding: 24px;
box-shadow: var(--shadow);
display: grid;
gap: 18px;
align-items: start;
}
.product-image {
height: 200px;
border-radius: 28px;
background: #f7f8ff;
border: 1px solid rgba(215, 224, 244, 0.9);
display: grid;
place-items: center;
overflow: hidden;
position: relative;
box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
}
.product-image::before {
content: '';
position: absolute;
inset: 0;
background: radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 35%);
}
.product-image svg {
width: 100px;
height: 100px;
position: relative;
z-index: 1;
}
.product-title {
margin: 0;
font-size: 18px;
font-weight: 700;
}
.product-price {
margin: 0;
font-size: 22px;
font-weight: 700;
}
.product-stock {
color: var(--muted);
font-size: 13px;
margin: 0;
}
.btn-add-cart {
border: none;
border-radius: 14px;
background: var(--success);
color: white;
padding: 14px 18px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
box-shadow: 0 14px 28px rgba(31, 132, 85, 0.18);
transition: transform 0.2s ease;
}
.btn-add-cart:hover {
transform: translateY(-2px);
}
.history {
background: var(--surface);
border-radius: 28px;
padding: 24px;
box-shadow: var(--shadow);
}
.history h2 {
margin: 0 0 20px;
font-size: 20px;
font-weight: 700;
}
.history-table {
width: 100%;
border-collapse: collapse;
min-width: 540px;
}
.history-table th,
.history-table td {
text-align: left;
padding: 14px 16px;
border-bottom: 1px solid rgba(31, 42, 69, 0.08);
}
.history-table th {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(--muted);
}
.history-table tbody tr:last-child td {
border-bottom: none;
}
.history-table td {
font-size: 14px;
color: var(--text);
}
@media (max-width: 1024px) {
.products {
grid-template-columns: repeat(2, minmax(0, 1fr));
}
}
@media (max-width: 780px) {
.header,
.search-bar {
flex-direction: column;
align-items: stretch;
}
.nav-links {
justify-content: space-between;
width: 100%;
}
.products {
grid-template-columns: 1fr;
}
.history-table {
min-width: 100%;
}
}
</style>
</head>
