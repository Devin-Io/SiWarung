<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola Stok - SiWarung</title>
<style>
:root {
--bg: #eef2fb;
--surface: #ffffff;
--surface-soft: #f5f7ff;
--text: #233047;
--muted: #7b86a5;
--border: #dce3f0;
--danger: #f05a5a;
--primary: #2d6cdf;
--radius: 24px;
--shadow: 0 24px 80px rgba(41, 77, 143, 0.08);
}
* {
box-sizing: border-box;
}
body {
margin: 0;
min-height: 100vh;
font-family: Inter, system-ui, sans-serif;
background: radial-gradient(circle at top left, rgba(45,108,223,0.12), transparent 22%),
var(--bg);
color: var(--text);
}
.page {
max-width: 1180px;
margin: 0 auto;
padding: 28px 24px 36px;
}
.topbar {
display: flex;
justify-content: space-between;
align-items: center;
gap: 20px;
margin-bottom: 30px;
}
.brand {
display: flex;
align-items: center;
gap: 16px;
padding: 18px 22px;
border-radius: 24px;
background: #ffffff;
box-shadow: var(--shadow);
}
.brand-icon {
width: 76px;
height: 76px;
display: grid;
place-items: center;
background: #ffffff;
border-radius: 20px;
overflow: hidden;
flex-shrink: 0;
}
.brand-icon img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center;
display: block;
background: #ffffff;
transform: scale(1.3);
}
.brand-text {
display: grid;
gap: 4px;
}
.brand-text .title {
margin: 0;
font-size: 20px;
font-weight: 800;
color: #1f3552;
}
.brand-text .subtitle {
margin: 0;
color: #5b7597;
font-size: 14px;
font-weight: 700;
opacity: 1;
}
.utility {
display: flex;
align-items: center;
gap: 12px;
}
.utility a {
position: relative;
display: grid;
place-items: center;
border: none;
background: var(--surface);
width: 48px;
height: 48px;
border-radius: 16px;
cursor: pointer;
box-shadow: 0 16px 36px rgba(15, 43, 115, 0.08);
color: var(--primary);
font-size: 18px;
text-decoration: none;
}
.utility a .tooltip {
position: absolute;
bottom: -32px;
left: 50%;
transform: translateX(-50%);
background: rgba(35, 48, 71, 0.92);
color: #fff;
padding: 6px 10px;
border-radius: 10px;
font-size: 11px;
white-space: nowrap;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s ease;
z-index: 10;
}
.utility a:hover .tooltip {
opacity: 1;
}
.card {
border-radius: 32px;
background: var(--surface);
padding: 28px;
box-shadow: var(--shadow);
}
.card-header {
display: flex;
justify-content: space-between;
align-items: center;
gap: 20px;
margin-bottom: 26px;
flex-wrap: wrap;
}
.card-header h1 {
margin: 0;
font-size: 24px;
letter-spacing: -0.03em;
}
.card-header .btn-add {
display: inline-flex;
align-items: center;
gap: 10px;
padding: 12px 18px;
border-radius: 16px;
border: none;
background: var(--primary);
color: white;
font-weight: 700;
box-shadow: 0 16px 36px rgba(45, 108, 223, 0.18);
}
.table-wrap {
overflow-x: auto;
}
table {
width: 100%;
border-collapse: collapse;
min-width: 640px;
font-size: 15px;
}
thead tr {
border-bottom: 1px solid rgba(35,48,71,0.08);
}
th, td {
text-align: left;
padding: 18px 16px;
}
th {
color: var(--muted);
text-transform: uppercase;
letter-spacing: 0.08em;
font-size: 13px;
font-weight: 700;
}
tbody tr {
background: #ffffff;
border-bottom: 1px solid rgba(35,48,71,0.05);
}
tbody tr:last-child {
border-bottom: none;
}
tbody td {
color: var(--text);
vertical-align: middle;
}
.stock-value {
font-weight: 700;
}
.stock-low {
color: var(--danger);
}
.actions {
display: flex;
gap: 10px;
}
.btn-sm {
display: inline-flex;
align-items: center;
justify-content: center;
padding: 10px 14px;
border-radius: 14px;
border: 1px solid transparent;
font-size: 13px;
font-weight: 700;
}
.btn-edit {
background: #eef5ff;
color: var(--primary);
border-color: rgba(45,108,223,0.18);
}
.btn-delete {
background: #fff4f4;
color: var(--danger);
border-color: rgba(240,90,90,0.18);
}
@media (max-width: 820px) {
.topbar,
.card-header {
flex-direction: column;
align-items: stretch;
}
.utility {
justify-content: flex-end;
}
}
</style>
</head>
<body>
<div class="page">
<div class="topbar">
<div class="brand">
<div class="brand-icon">
<img src="assets/logo.png" alt="SiWarung logo">
</div>
<div class="brand-text">
<p class="title">SiWarung</p>
<p class="subtitle">Kelola Stok</p>
</div>
</div>
<div class="utility">
<a href="dashboard.html" aria-label="Dashboard">

</a>
<a href="input penjualan.html" aria-label="Input Penjualan">

<span class="tooltip">Input Penjualan</span>
</a>
<a href="laporan.html" aria-label="Laporan">

📊
<span class="tooltip">Laporan</span>
</a>
<a href="index.html" aria-label="Logout">

🚪
<span class="tooltip">Logout</span>
</a>
</div>
</div>

<div class="card-header">

</div>
<div class="table-wrap">
<table>

</tr>

<tbody>

</td>

</tr>
</tbody>
</table>
</div>
</div>
</div>

</body>
</html>
