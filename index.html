<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login SiWarung</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #e6e6e6;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
.container {
background: white;
padding: 30px;
width: 320px;
border-radius: 6px;
text-align: center;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
.logo img {
width: 220px;
margin-bottom: 15px;
}
.input-group {
margin-bottom: 12px;
text-align: left;
}
label {
font-size: 14px;
display: block;
margin-bottom: 4px;
}
input {
width: 100%;
padding: 10px;
border: 1px solid #ccc;
border-radius: 4px;
}
.btn-login {
width: 100%;
padding: 10px;
background-color: #2d6cdf;
color: white;
border: none;
border-radius: 4px;
margin-top: 10px;
cursor: pointer;
font-weight: bold;
}
.error {
font-size: 13px;
margin-top: 10px;
color: red;
}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<img src="assets/logo.png" alt="Logo SiWarung">
</div>
<form id="loginForm">
<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Masukkan Username">
</div>
<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Masukkan Password">
</div>
<button type="submit" class="btn-login">Login</button>
</form>
</div>
  <!-- Penyesuaian Pertemuan 13: script eksternal, tampilan asli tidak diubah -->
  <script src="assets/js/jquery.js"></script>
  <script src="assets/js/siwarung-pertemuan13.js"></script>
</body>
</html>
