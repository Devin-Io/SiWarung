<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Penjualan - SiWarung</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/css/siwarung-bootstrap.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-siwarung sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">
      <img src="assets/logo.png" class="brand-logo" alt="Logo SiWarung">
      <span>SiWarung</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSiWarung" aria-controls="navbarSiWarung" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSiWarung">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link " href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="input penjualan.html"><i class="bi bi-receipt me-1"></i>Input Penjualan</a></li>
        <li class="nav-item"><a class="nav-link " href="kelola stok produk.html"><i class="bi bi-box-seam me-1"></i>Kelola Stok</a></li>
        <li class="nav-item"><a class="nav-link " href="katalog.html"><i class="bi bi-grid me-1"></i>Katalog</a></li>
        <li class="nav-item"><a class="nav-link " href="laporan.html"><i class="bi bi-bar-chart me-1"></i>Laporan</a></li>
        <li class="nav-item ms-lg-2"><a class="btn btn-outline-primary btn-sm" href="index.html"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<main class="section-space">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="mb-4">
          <h1 class="page-title mb-2">Input Penjualan</h1>
          <p class="page-subtitle mb-0">Catat transaksi penjualan harian dan lihat riwayat input secara langsung.</p>
        </div>
        <div class="card">
          <div class="card-body p-4">
            <form id="salesForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="itemSelect" class="form-label">Nama Barang</label>
                  <select id="itemSelect" class="form-select">
                    <option value="">Pilih barang</option>
                    <option>Rokok A</option>
                    <option>Minuman B</option>
                    <option>Mie Instan C</option>
                    <option>Beras 5 Kg</option>
                    <option>Gula 1 Kg</option>
                    <option>Kopi Sachet</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="quantityInput" class="form-label">Jumlah</label>
                  <input type="number" id="quantityInput" class="form-control" min="1" placeholder="Masukkan jumlah">
                </div>
                <div class="col-12">
                  <label for="totalPrice" class="form-label">Total Harga</label>
                  <input type="text" id="totalPrice" class="form-control" readonly value="Rp 0">
                </div>
                <div class="col-12 d-flex gap-2 justify-content-end flex-wrap">
                  <button type="reset" class="btn btn-outline-secondary">Reset</button>
                  <button type="submit" class="btn btn-primary btn-submit"><i class="bi bi-save me-1"></i>Simpan Transaksi</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card h-100">
          <div class="card-body p-4">
            <h2 class="h4 fw-bold mb-1">Riwayat Input</h2>
            <p class="text-muted">Data yang ditambahkan tampil sementara pada halaman ini.</p>
            <div class="no-records alert alert-info">Belum ada transaksi yang baru diinput.</div>
            <div class="record-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="assets/js/jquery.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/siwarung-pertemuan13.js"></script>
</body>
</html>
